<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline';
        img-src     'self' data: blob:;
        font-src    'self' data:;
        media-src   'self' blob: data:;
        connect-src 'self' ws://localhost:* http://localhost:*;
        frame-src   'none';
        object-src  'none';
        base-uri    'self';
        form-action 'none';
      "
    />
    <title>VoiceInk</title>
    <script>
      /* Read the density from the URL hash (set by the main process at window
         creation time). Stamping `data-density` on <html> BEFORE any CSS rule
         evaluates prevents the one-frame flash of the wrong chrome during a
         density hot-swap. The window's backgroundColor (transparent for the
         pill, #07070d for the main window) takes care of the paint before
         the CSS bundle finishes loading. */
      (function () {
        try {
          var h = (location.hash || '').replace('#', '');
          // Strip optional "-sampler" test suffix.
          h = h.replace(/-sampler$/, '');
          if (h === 'compact' || h === 'comfortable') {
            document.documentElement.setAttribute('data-density', h);
          }
        } catch (_) { /* no-op */ }
      })();
    </script>
  </head>
  <body class="text-white overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
